<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a8dadc;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
      margin: 0 auto 2rem;
      width: fit-content;
    }

    .cell {
      width: 110px;
      height: 110px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #a8dadc;
    }

    .cell.winner {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease-in-out 2;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    .btn {
      padding: 0.7rem 2rem;
      font-size: 1rem;
      border: 2px solid #e94560;
      background: transparent;
      color: #e94560;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, color 0.2s;
    }

    .btn:hover {
      background: #e94560;
      color: #fff;
    }

    .score {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-item {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
    }

    .score-item span {
      display: block;
      font-size: 1.5rem;
      font-weight: bold;
    }

    .score-item.x-score span { color: #e94560; }
    .score-item.o-score span { color: #a8dadc; }
    .score-item.tie-score span { color: #888; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TIC TAC TOE</h1>

    <div class="score">
      <div class="score-item x-score">X <span id="scoreX">0</span></div>
      <div class="score-item tie-score">Ties <span id="scoreTie">0</span></div>
      <div class="score-item o-score">O <span id="scoreO">0</span></div>
    </div>

    <div class="status" id="status">X's turn</div>

    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <button class="btn" id="restartBtn">New Game</button>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill('');
    let current = 'X';
    let gameOver = false;
    let score = { X: 0, O: 0, Tie: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const winLine = checkWin();
      if (winLine) {
        winLine.forEach(idx => cells[idx].classList.add('winner'));
        status.textContent = `${current} wins!`;
        score[current]++;
        updateScore();
        gameOver = true;
      } else if (board.every(v => v)) {
        status.textContent = "It's a tie!";
        score.Tie++;
        updateScore();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    }));

    document.getElementById('restartBtn').addEventListener('click', reset);

    function checkWin() {
      return WINS.find(([a,b,c]) =>
        board[a] && board[a] === board[b] && board[a] === board[c]
      ) || null;
    }

    function updateScore() {
      document.getElementById('scoreX').textContent = score.X;
      document.getElementById('scoreO').textContent = score.O;
      document.getElementById('scoreTie').textContent = score.Tie;
    }

    function reset() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      status.textContent = "X's turn";
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    }
  </script>
</body>
</html>
